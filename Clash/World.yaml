proxy-providers:
  👑 Mainstream:
    type: http
    url: https://xxx ## input your mainstream proxy subscription link here
    interval: 3600
    path: ./providers/Mainstream.yaml
    filter: "^((?!(Premium| G |Traffic|Expire)).)*$"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "👑 "
  🧩 Alternative:
    type: file
    path: ./providers/xxx.yaml ## this is a local file type provider
    filter: "^((?!(GB|Traffic|Expire)).)*$"
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "🧩 "
  📎 Substitute:
    type: http
    url: https://xx ## input your substitute proxy subscription link here
    interval: 3600
    path: ./providers/Substitute.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    override:
      additional-prefix: "📎 "